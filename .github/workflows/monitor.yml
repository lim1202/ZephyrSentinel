name: Monitor

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target ID to check (optional)'
        required: false
        type: string
      dry_run:
        description: 'Run without saving state or sending notifications'
        required: false
        type: boolean
        default: false
      branch:
        description: 'Specific monitor branch to run (optional, e.g., monitor/crimsonwitch-codes)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # Discover monitor branches dynamically
  discover:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.list.outputs.branches }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List monitor branches
        id: list
        run: |
          # Get all monitor/* branches
          BRANCHES=$(git branch -r | grep 'origin/monitor/' | sed 's/origin\///' | tr -d ' ' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Found branches: $BRANCHES"

  # Run monitoring for each branch using matrix
  monitor:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.discover.outputs.branches != '[]' && needs.discover.outputs.branches != ''
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover.outputs.branches) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run monitoring
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          node dist/cli.js run \
            ${{ inputs.target && format('--target {0}', inputs.target) || '' }} \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Commit state changes
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state/
          git diff --quiet --staged || git commit -m "chore: update monitoring state [skip ci]"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-state-${{ matrix.branch }}
          path: state/
          retention-days: 7