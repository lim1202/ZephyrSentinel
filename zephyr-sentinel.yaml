version: "1.0"

targets:
  - id: "crimsonwitch-genshin"
    name: "Crimson Witch - Genshin Impact Codes"
    url: "https://www.crimsonwitch.com/feeds/Genshin_Impact/RSS"
    type: "rss"
    enabled: true
    alertOn:
      change: true
      error: true
      recovery: true

  - id: "crimsonwitch-zenless"
    name: "Crimson Witch - Zenless Zone Zero Codes"
    url: "https://www.crimsonwitch.com/feeds/Zenless_Zone_Zero/RSS"
    type: "rss"
    enabled: true
    alertOn:
      change: true
      error: true
      recovery: true

notifications:
  dingtalk:
    enabled: true
    webhook: "${DINGTALK_WEBHOOK}"
    secret: "${DINGTALK_SECRET}"
    msgType: "markdown"

storage:
  type: "git"
  git:
    path: "state"
