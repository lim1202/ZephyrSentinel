version: "1.0"

targets:
  - id: "crimsonwitch-genshin"
    name: "Crimson Witch - Genshin Impact Codes"
    url: "https://www.crimsonwitch.com/codes/Genshin_Impact"
    type: "webpage"
    selector: "#old-codes"
    enabled: true
    http:
      headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    alertOn:
      change: true
      error: true
      recovery: true

  - id: "crimsonwitch-zenless"
    name: "Crimson Witch - Zenless Zone Zero Codes"
    url: "https://www.crimsonwitch.com/codes/Zenless_Zone_Zero"
    type: "webpage"
    selector: "#old-codes"
    enabled: true
    http:
      headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    alertOn:
      change: true
      error: true
      recovery: true

notifications:
  dingtalk:
    enabled: true
    webhook: "${DINGTALK_WEBHOOK}"
    secret: "${DINGTALK_SECRET}"
    msgType: "markdown"

storage:
  type: "git"
  git:
    path: "state"
